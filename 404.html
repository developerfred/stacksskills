<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="canonical" href="https://stacksskills.com/404">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <style>
        :root {
            --orange: #F7931A;
            --orange-dark: #E67E00;
            --black: #0D0D0D;
            --black-soft: #1A1A1A;
            --white: #FAFAFA;
            --gray: #6B6B6B;
            --gray-light: #E5E5E5;
            
            --font-display: 'Syne', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-mono);
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-family: var(--font-display);
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 800;
            line-height: 1;
            color: var(--orange);
            margin-bottom: 1rem;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        p {
            color: var(--gray);
            max-width: 400px;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--black);
            background: var(--white);
            padding: 1rem 1.5rem;
            border: 2px solid var(--white);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        a:hover {
            background: transparent;
            color: var(--white);
        }

        .links {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .links a {
            font-size: 12px;
            padding: 0.75rem 1rem;
        }
    </style>
</head>

    <div class="error-code">404</div>

    <div class="links">
