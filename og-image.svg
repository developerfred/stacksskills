<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F7931A"/>
      <stop offset="100%" style="stop-color:#E67E00"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Orange accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#orange)"/>
  
  <!-- Logo circle -->
  <circle cx="200" cy="315" r="80" fill="none" stroke="url(#orange)" stroke-width="4"/>
  <circle cx="200" cy="315" r="60" fill="none" stroke="url(#orange)" stroke-width="2" opacity="0.5"/>
  
  <!-- Bitcoin symbol simplified -->
  <text x="200" y="335" font-family="sans-serif" font-size="72" font-weight="bold" fill="#F7931A" text-anchor="middle">₿</text>
  
  <!-- Title -->
  <text x="380" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#FAFAFA" letter-spacing="-0.02em">StacksSkills</text>
  
  <!-- Subtitle -->
  <text x="380" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#6B6B6B">AI agents are wrong about Stacks</text>
  
  <!-- Key points -->
  <g transform="translate(380, 380)">
    <rect x="0" y="0" width="24" height="24" rx="4" fill="#F7931A"/>
    <text x="36" y="18" font-family="monospace" font-size="18" fill="#FAFAFA">Clarity is NOT Solidity</text>
  </g>
  
  <g transform="translate(380, 420)">
    <rect x="0" y="0" width="24" height="24" rx="4" fill="#F7931A"/>
    <text x="36" y="18" font-family="monospace" font-size="18" fill="#FAFAFA">Hiro Wallet, NOT MetaMask</text>
  </g>
  
  <g transform="translate(380, 460)">
    <rect x="0" y="0" width="24" height="24" rx="4" fill="#F7931A"/>
    <text x="36" y="18" font-family="monospace" font-size="18" fill="#FAFAFA">$0.0001 transaction costs</text>
  </g>
  
  <!-- URL -->
  <text x="380" y="560" font-family="monospace" font-size="16" fill="#6B6B6B">stacksskills.com</text>
</svg>
